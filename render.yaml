services:
  - type: web
    name: rag-customer-support-chatbot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -c gunicorn.conf.py app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.18
    buildFilter:
      paths:
        - requirements.txt
        - pyproject.toml
        - runtime.txt
