services:
  - type: web
    name: rag-customer-support-chatbot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -c gunicorn.conf.py app:app
                    envVars:
                  - key: PYTHON_VERSION
                    value: 3.9.18
                  - key: PIP_FORCE_VERSION
                    value: 3.9
                  - key: FLASK_ENV
                    value: production
                  - key: FLASK_DEBUG
                    value: false
    buildFilter:
      paths:
        - "requirements.txt"
        - "pyproject.toml"
        - "runtime.txt"
